<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Relatórios - Venda+ Tech</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-sidebar: #0f172a;
            --bg-editor: #090d16;
            --border-color: #1e293b;
            --text-muted: #64748b;
            --text-normal: #94a3b8;
            --text-active: #f8fafc;
            --accent-color: #6366f1; /* Indigo */
            --accent-glow: rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-editor);
            color: var(--text-normal);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Clean Layout */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            height: 100vh;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            user-select: none;
            flex-shrink: 0;
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-active);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 14px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        /* Interactive Folder Row */
        .folder-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-active);
            font-weight: 600;
            font-size: 13.5px;
            transition: background 0.2s ease;
        }

        .folder-row:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .folder-info {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .folder-info svg.arrow {
            width: 10px;
            height: 10px;
            color: var(--text-muted);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .folder-row.collapsed svg.arrow {
            transform: rotate(-90deg);
        }

        .folder-info svg.folder-icon {
            width: 16px;
            height: 16px;
            color: #818cf8; /* Light Indigo folder color */
            flex-shrink: 0;
        }

        .folder-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .folder-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .folder-row:hover .folder-actions {
            opacity: 1;
        }

        .folder-actions svg {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .folder-actions svg:hover {
            color: var(--text-active);
        }

        /* Nested Files under Folders (indented block) */
        .folder-contents {
            display: block;
        }

        .folder-contents.collapsed {
            display: none;
        }

        /* Nested File Item (matching the screenshot) */
        .nested-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 2px 0 2px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .nested-file-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .nested-file-item.active {
            background-color: #252526; /* Gray container box from screenshot */
            color: var(--text-active);
        }

        .nested-file-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .nested-file-left svg.arrow-icon {
            width: 12px;
            height: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .nested-file-item.active svg.arrow-icon {
            color: var(--accent-color);
        }

        .nested-file-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .nested-file-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nested-file-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Inline Rename Input */
        .rename-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--accent-color);
            color: #fff;
            font-size: 13px;
            padding: 2px 6px;
            border-radius: 4px;
            width: 100%;
            outline: none;
            display: none;
        }

        /* Action Buttons */
        .edit-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .nested-file-item:hover .edit-btn {
            opacity: 1;
        }

        .edit-btn:hover {
            color: var(--text-active);
            background: rgba(255, 255, 255, 0.05);
        }

        .edit-btn svg {
            width: 13px;
            height: 13px;
        }

        /* New Folder Inline Form */
        .new-folder-form {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 10px;
            margin: 6px 12px;
            display: none;
        }

        .new-folder-form input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 12.5px;
            outline: none;
        }

        .new-folder-form input:focus {
            border-color: var(--accent-color);
        }

        .new-folder-form-btns {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 8px;
        }

        .new-folder-form-btns button {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .new-folder-form-btns button.btn-ok {
            background-color: var(--accent-color);
            color: #fff;
        }

        .new-folder-form-btns button.btn-cancel {
            background: transparent;
            border-color: var(--border-color);
            color: var(--text-normal);
        }

        /* Floating Context Menu */
        .context-menu {
            display: none;
            position: absolute;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            z-index: 9999;
            padding: 6px 0;
            min-width: 180px;
        }

        .context-menu-item {
            padding: 8px 14px;
            font-size: 12.5px;
            color: var(--text-normal);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s ease;
        }

        .context-menu-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-active);
        }

        .context-menu-divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 4px 0;
        }

        .context-menu-header {
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-editor);
            height: 100vh;
            overflow: hidden;
        }

        /* Active File Header Bar */
        .editor-header {
            height: 55px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-shrink: 0;
        }

        .header-content-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .active-file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-active);
        }

        .active-file-info span.dot-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-color);
        }

        /* Toggle Sidebar Button */
        .toggle-sidebar-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .toggle-sidebar-btn:hover {
            color: var(--text-active);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .toggle-sidebar-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Viewport Container */
        .editor-viewport {
            flex: 1;
            position: relative;
            background-color: #0b0f19;
        }

        .editor-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .editor-frame.active {
            display: block;
        }

        /* Welcome Page */
        .welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-editor);
            color: var(--text-muted);
            text-align: center;
            padding: 24px;
        }

        .welcome-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .welcome-logo svg {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.05);
        }

        .welcome-screen h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .welcome-screen p {
            font-size: 13px;
        }
    </style>
</head>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Endividamento Brasileiro - Painel de Dados</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #0ea5e9; /* Sky Blue */
            --accent-success: #10b981; /* Emerald */
            --accent-warning: #f59e0b; /* Amber */
            --accent-danger: #ef4444; /* Red */
            --border-color: #374151;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #0ea5e9 100%);
            --gradient-card-glow: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(14, 165, 233, 0.15) 100%);
            --shadow-premium: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Light Mode Variable Overrides */
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --shadow-premium: 0 10px 30px -10px rgba(148, 163, 184, 0.3);
            --gradient-card-glow: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(14, 165, 233, 0.05) 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            transition: var(--transition-smooth);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* Header section */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            font-size: 2rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text h1 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
            margin-top: -3px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-premium);
        }

        .theme-toggle-btn:hover {
            border-color: var(--accent-primary);
            transform: scale(1.05);
        }

        /* Main Container */
        main {
            max-width: 1400px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 2rem;
            flex-grow: 1;
        }

        /* Hero Banner Section */
        .hero-banner {
            background: var(--gradient-card-glow);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-premium);
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-primary);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hero-content h2 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .hero-content p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
        }

        .sources-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .pill {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .pill i {
            color: var(--accent-secondary);
        }

        /* Quick Stats Grid */
        .quick-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-premium);
            position: relative;
        }

        .stat-card::after {
            content: '';

    <!-- Vanilla Javascript for logic and theme toggle -->
    <script>
        // Tab switching logic
        function switchTab(tabId) {
            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.topic-tab');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Remove active class from all panels
            const panels = document.querySelectorAll('.topic-panel');
            panels.forEach(panel => panel.classList.remove('active'));

            // Add active class to selected tab and panel
            const activePanel = document.getElementById(tabId);
            activePanel.classList.add('active');

            // Find the tab button that calls this function and make it active
            const clickedTab = Array.from(tabs).find(tab => tab.getAttribute('onclick').includes(tabId));
            if (clickedTab) {
                clickedTab.classList.add('active');
            }
        }

        // Theme Toggle logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // Check for saved theme preference, default to dark
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'light') {
                themeIcon.className = 'fa-solid fa-moon';
            } else {
                themeIcon.className = 'fa-solid fa-sun';
            }
        }
    </script>

        }

        function copyBody(id) {

            if (item) {
                const htmlCode = formatEmailHTML(item.body);

        // Copy logic with feedback
        function copyText(text) {

                }, 2500);
            }).catch(err => {

        // Renderizar a tabela Ad Grid para os dois slides (5 e 6)
        function renderAdGrid() {
            [5, 6].forEach(slideNum => {
                const table = document.getElementById(`ad-grid-table-${slideNum}`);
                if (!table) return;
                table.innerHTML = '';

                // Canto superior esquerdo vazio
                const corner = document.createElement('div');
                corner.className = 'grid-cell-corner';
                table.appendChild(corner);

                const currentAvatares = slideNum === 5 ? avatares5 : avatares6;
                const currentMatrix = slideNum === 5 ? anunciosMatrix5 : anunciosMatrix6;

                // Cabeçalhos X (Avatares) - Tornados editáveis
                currentAvatares.forEach((av, idx) => {
                    const header = document.createElement('div');
                    header.className = 'grid-header axis-x';
                    header.contentEditable = "true";
                    header.spellcheck = false;
                    header.innerText = av;
                    header.addEventListener('input', () => {
                        currentAvatares[idx] = header.innerText;
                        localStorage.setItem(`venda_tech_adgrid_avatares_${slideNum}`, JSON.stringify(currentAvatares));
                    });
                    table.appendChild(header);
                });

                // Linhas de Hooks + Células de Anúncios

                    // Cabeçalho Y (Hook) - Tornado editável
                    const headerY = document.createElement('div');
                    headerY.className = 'grid-header axis-y';
                    headerY.contentEditable = "true";
                    headerY.spellcheck = false;
                    headerY.innerText = hooks[r-1];
                    
                    const hookIdx = r - 1;
                    headerY.addEventListener('input', () => {
                        hooks[hookIdx] = headerY.innerText;
                        localStorage.setItem('venda_tech_adgrid_hooks', JSON.stringify(hooks));
                        // Manter os ganchos das duas tabelas em sincronia visual
                        updateHooksVisual(hookIdx, headerY.innerText);
                    });
                    
                    table.appendChild(headerY);

                    // Células de anúncios
                    for (let c = 1; c <= currentAvatares.length; c++) {
                        const cellKey = `${r}-${c}`;
                        const adData = currentMatrix[cellKey];
                        const isMarked = markedAds.includes(`${slideNum}-${cellKey}`);
                        
                        const btn = document.createElement('button');
                        btn.className = `grid-cell-btn ${r === 1 && c === 1 ? 'active' : ''} ${isMarked ? 'marked' : ''}`;
                        btn.id = `btn-ad-${slideNum}-${cellKey}`;
                        btn.onclick = () => selectAd(r, c, slideNum);

                        pin.title = 'Marcar anúncio';

                            btn.classList.toggle('marked');

                            const uniquePinKey = `${slideNum}-${cellKey}`;

                            if (index > -1) {

                            } else {
                                markedAds.push(uniquePinKey);
                            }
                            localStorage.setItem('venda_tech_adgrid_marked_v2', JSON.stringify(markedAds));
                        };
                        btn.appendChild(pin);

                        const code = document.createElement('div');
                        code.className = 'ad-code';
                        code.innerText = `AD ${r}-${c}`;

                        const titlePreview = document.createElement('div');
                        titlePreview.className = 'ad-preview-title';
                        titlePreview.innerText = adData.title;

                        btn.appendChild(code);
                        btn.appendChild(titlePreview);
                        table.appendChild(btn);
                    }
                }
            });
        }

        let currentSlideIndex = 1;

        // Gerar bolinhas de navegação

        for (let i = 1; i <= totalSlides; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i === 1 ? 'active' : ''}`;
            dot.onclick = () => goToSlide(i);
            dot.id = `dot-${i}`;
            dotsContainer.appendChild(dot);
        }

        // Ir para slide específico
        function goToSlide(index) {
            if (index < 1 || index > totalSlides) return;
            
            // Remover classe ativa
            document.getElementById(`slide-${currentSlideIndex}`).classList.remove('active');
            document.getElementById(`dot-${currentSlideIndex}`).classList.remove('active');
            
            // Ativar novos
            currentSlideIndex = index;
            document.getElementById(`slide-${currentSlideIndex}`).classList.add('active');
            document.getElementById(`dot-${currentSlideIndex}`).classList.add('active');
            
            // Atualizar contador
            document.getElementById('slide-counter').innerText = `${currentSlideIndex} / ${totalSlides}`;
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides) {
                goToSlide(currentSlideIndex + 1);
            } else {
                goToSlide(1); // loop
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 1) {
                goToSlide(currentSlideIndex - 1);
            } else {
                goToSlide(totalSlides); // loop
            }
        }

        // Eventos de Teclado
        document.addEventListener('keydown', (e) => {
            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
            const isEditing = activeTag === 'input' || activeTag === 'textarea' || document.activeElement.isContentEditable;
            
            if (isEditing) return;

            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });
    </script>

                            <p>O devedor tem **20 dias** a partir da notificação para pagar as prestações em atraso acrescidas de juros contratuais e custos de cartório.</p>
                        </div>
                    </div>
                    <div class="flow-step">
                        <div class="step-num">4</div>
                        <div class="step-info">
                            <h5>Consolidação e Busca Extrajudicial</h5>
                            <p>Sem pagamento em 20 dias, a propriedade consolida-se no credor. O RTD emite uma Certidão de Busca e Restrição de Trânsito no RENAVAM, autorizando a apreensão física do bem.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Estratégias de Defesa e Descaracterização da Mora
                </h2>
                <p>O devedor possui instrumentos rígidos para se defender e obstar a execução abusiva:</p>

                <h3 class="subsection-title">Fatores Temporais: Quando ocorrem as notificações e apreensões?</h3>
                <p><strong>Começo vs. Final do Mês:</strong> As notificações de mora e cobranças bancárias tendem a se concentrar entre os dias <strong>10 e 25 de cada mês</strong>. Isso ocorre porque a maioria dos financiamentos vence no início do mês e, após o prazo de tolerância amigável (15 a 30 dias), as assessorias de cobrança disparam os lotes de notificações. Já o cumprimento físico do mandado pelo oficial de justiça não tem data fixa, mas costuma ter picos de sucesso de localização nos <strong>primeiros 10 dias do mês</strong> (período pós-salário em que o veículo circula mais) ou aos <strong>finais de semana</strong>.</p>
                <p><strong>Finais de semana e Feriados:</strong> Pela regra geral (art. 212 do CPC), os mandados judiciais devem ser cumpridos em dias úteis das 6h às 20h. Contudo, os bancos rotineiramente solicitam autorização judicial para cumprimento aos <strong>sábados, domingos e feriados</strong> ou em horários noturnos (art. 212, §2º, CPC), sob alegação de risco de ocultação do veículo, o que é amplamente deferido pelos juízes. <em>Atenção:</em> No rito <strong>extrajudicial</strong> da Lei 14.711/2023, a apreensão privada não tem poder coercitivo de arrombamento ou invasão, devendo respeitar a inviolabilidade domiciliar em qualquer dia ou horário.</p>

                <h3 class="subsection-title">1. Purgação da Mora após Apreensão Judicial</h3>
                <p>O devedor tem **5 dias** a partir da apreensão física do bem para pagar a dívida. De acordo com o **Tema 722/STJ**, a purgação da mora exige o pagamento da **integralidade da dívida pendente** (parcelas vencidas + vincendas), e não apenas o que estava em atraso.</p>

                <h3 class="subsection-title">2. Contestação e Discussão Contratual</h3>
                <p>O prazo para contestar a ação judicial é de **15 dias** contados da **execução da liminar (apreensão)**. De acordo com o **Tema 1.040/STJ**, a contestação não pode ser decidida pelo juiz antes da efetiva apreensão do bem.</p>

                <div class="alert alert-success">
                    <div class="alert-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <div class="alert-content">
                        <h4>Descaracterização da Mora (Tese de Defesa de Elite)</h4>
                        <p>O STJ fixou que a abusividade dos encargos cobrados no **período de normalidade contratual** (como juros remuneratórios muito acima da taxa média de mercado ou capitalização mensal não contratada) **descaracteriza a mora**. Sem mora comprovada, a ação de busca e apreensão deve ser extinta e considerada improcedente.</p>
                    </div>
                </div>

                <div class="alert alert-danger">
                    <div class="alert-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
                    </div>
                    <div class="alert-content">
                        <h4>Limitações importantes da Defesa</h4>
                        <p>A abusividade de encargos meramente *moratórios* (multa de atraso, juros moratórios) ou tarifas acessórias (seguros embutidos, tarifas de cadastro) **não** descaracteriza a mora (**Tema 972/STJ**). Além disso, a mera propositura de ação revisional não suspende a busca e apreensão, salvo se houver depósito judicial ou liminar suspensiva (**Súmula 380/STJ**).</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- SECTION 2: ENDIVIDAMENTO PJ -->
        <div id="endividamento-pj" class="tab-section">
            
            <div class="card">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Revisão de Contratos Bancários Corporativos (+50K)
                </h2>
                <p>As empresas utilizam Cédulas de Crédito Bancário (CCB), Conta Garantida e contratos de Giro. Para revisar as taxas e encargos cobrados pelas instituições financeiras, focando em passivos superiores a R$ 50.000:</p>

                <div class="alert alert-info">
                    <div class="alert-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    </div>
                    <div class="alert-content">
                        <h4>Segregação do Público-Alvo: Passivos Bancários Gerais</h4>
                        <p><strong>A captação ativa de novos casos deve priorizar contratos cujo passivo bancário total (ou saldo devedor individual da operação) supere R$ 50.000 (tanto para PF quanto para PJ).</strong> Isso assegura margem técnica viável para a contratação do assistente contábil do perito e honorários profissionais. Dívidas de menor valor devem ser excluídas da segmentação das campanhas de tráfego pago.</p>
                    </div>
                </div>

                <h3 class="subsection-title">O Ciclo Mensal do Caixa: Quando a crise de endividamento atinge o pico?</h3>
                <p><strong>Pico de Inadimplência e Demanda de Crédito (Dias 25 a 05):</strong> O estrangulamento de caixa das micro, pequenas e médias empresas segue um ciclo sazonal rígido. O maior volume de inadimplemento de parcelas, busca por crédito emergencial e conflitos de caixa ocorre entre o <strong>dia 25 e o 5º dia útil do mês seguinte</strong>. É nesse período que se acumulam os maiores desembolsos de caixa corporativo: impostos federais (Simples Nacional vence dia 20; PIS/COFINS vencem dia 25), fornecedores chave (geralmente concentrados no fechamento do mês) e, crucialmente, a <strong>folha de pagamento de funcionários</strong> (5º dia útil).</p>
                <p><strong>Bloqueios Judiciais e Sisbajud:</strong> As ordens de bloqueio de contas corporativas via Sisbajud são transmitidas de forma eletrônica de segunda a sexta-feira durante o horário de expediente bancário/judicial. Embora não ocorram em finais de semana, os efeitos de um bloqueio realizado em uma sexta-feira à tarde costumam paralisar a folha de pagamento do final de semana, gerando danos operacionais massivos para a empresa.</p>

                <h3 class="subsection-title">1. Aplicação do Código de Defesa do Consumidor para Empresas</h3>
                <p>O STJ adota a **Teoria Finalista Mitigada**: o CDC em regra não se aplica se a empresa capta o crédito para fomentar sua atividade produtiva (insumo). Contudo, o CDC será aplicado se a empresa comprovar **vulnerabilidade técnica, jurídica ou econômica** perante o banco. Sem o CDC, a revisão se apoia estritamente no Código Civil e na quebra de boa-fé.</p>

                <h3 class="subsection-title">2. Parâmetro de Abusividade dos Juros</h3>
                <p>Bancos não sofrem o limite de 12% ao ano da Lei de Usura (**Súmula 596/STF**). A abusividade é auferida comparando a taxa contratada com a **Taxa Média de Mercado** do Banco Central na mesma data e modalidade de operação. A taxa só é considerada abusiva se exceder substancialmente essa média (geralmente acima de 1,5x ou 2x).</p>

                <div class="alert alert-info">
                    <div class="alert-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    </div>
                    <div class="alert-content">
                        <h4>Capitalização Mensal de Juros (Anatocismo)</h4>
                        <p>É permitida a capitalização de juros com periodicidade inferior a um ano em contratos firmados após 31/3/2000, desde que expressamente pactuada (**Súmula 539/STJ**). De acordo com a **Súmula 541/STJ**, prever a taxa de juros anual superior ao duodécuplo (12x) da taxa mensal é prova matemática e expressa suficiente de capitalização contratada.</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v1"></path><path d="M18 8h4a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-4"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    Ação Revisional sob a Égide do Artigo 330 do CPC
                </h2>
                <p>Para evitar o indeferimento liminar da petição revisional por inépcia, o CPC impõe regras estritas:</p>
                
                <ul class="custom-list danger-list">
                    <li><strong>Discriminação Obrigatória (Art. 330, §2º):</strong> O devedor deve expressamente apontar quais taxas ou encargos contratuais controverte, quantificando de forma precisa o valor incontroverso.</li>
                    <li><strong>Depósito/Pagamento Continuado (Art. 330, §3º):</strong> O valor incontroverso do débito deve continuar sendo pago conforme o modo contratado.</li>
                    <li><strong>Parecer Técnico Contábil Prévio:</strong> É mandatório instruir a inicial com parecer contábil elaborado por perito para fundamentar os juros abusivos calculados.</li>
                </ul>

                <h3 class="subsection-title">Requisitos para Liminar contra Negativação (SPC/Serasa)</h3>
                <p>Para suspender liminarmente os efeitos do inadimplemento e impedir o registro de restrições ou retenção de garantias, exige-se cumulativamente:</p>
                
                <div class="flow-timeline">
                    <div class="flow-step">
                        <div class="step-num">1</div>
                        <div class="step-info">
                            <h5>Ajuizamento Válido</h5>
                            <p>Propositura da ação contestando a integralidade ou parte do passivo contratual.</p>
                        </div>
                    </div>
                    <div class="flow-step">
                        <div class="step-num">2</div>
                        <div class="step-info">
                            <h5>Jurisprudência Consolidada</h5>
                            <p>A fundamentação jurídica deve demonstrar a fumaça do bom direito embasada em teses pacíficas do STJ ou STF.</p>
                        </div>
                    </div>
                    <div class="flow-step">
                        <div class="step-num">3</div>
                        <div class="step-info">
                            <h5>Garantia Judicial</h5>
                            <p>Depósito judicial periódico das parcelas incontroversas calculadas ou apresentação de caução real idônea.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- SECTION 3: R.J. & BLINDAGEM -->
        <div id="rj-protecao" class="tab-section">
            
            <div class="card">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Planejamento e Blindagem Patrimonial Lícita
                </h2>
                <p>A blindagem patrimonial visa segregar os ativos e o patrimônio pessoal dos sócios dos riscos operacionais do negócio. Para ser considerada lícita, deve ser estruturada de forma puramente **preventiva**, antes do estado de insolvência ou execução judicial de dívidas.</p>

                <h3 class="subsection-title">Mecanismos de Blindagem Lícita</h3>
                <ul class="custom-list">
                    <li><strong>Holdings Patrimoniais:</strong> Empresa criada com o escopo de concentrar os imóveis e bens do grupo, cobrando aluguel operacional e afastando os bens de riscos trabalhistas e comerciais diretos.</li>
                    <li><strong>Doações Preventivas:</strong> Doação de bens com reserva de usufruto e cláusulas restritivas de incomunicabilidade e impenhorabilidade (antes de haver qualquer débito constituído).</li>
                    <li><strong>Seguros D&O (Directors & Officers):</strong> Seguro contratado para blindar o patrimônio pessoal dos diretores por atos regulares de gestão operacional que venham a sofrer processos.</li>
                </ul>

                <div class="alert alert-danger">
                    <div class="alert-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    </div>
                    <div class="alert-content">
                        <h4>Limitações e Riscos Judiciais</h4>
                        <p><strong>Desconsideração da Personalidade Jurídica (Art. 50, CC):</strong> O juiz pode atingir o patrimônio pessoal dos sócios sem demonstrar confusão ou fraude. Foco no passivo bancário de elite.</p>
                        <p><strong>Fraude contra Credores & Fraude à Execução:</strong> A venda ou doação de bens após a distribuição de ações capazes de insolentar o devedor são ineficazes e passíveis de anulação judicial (**Súmula 375/STJ**).</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                    Recuperação Judicial (Lei nº 11.101/2005 alterada pela Lei nº 14.112/2020)
                </h2>
                <p>A Recuperação Judicial é o remédio extremo para reestruturar passivos massivos de pessoas jurídicas de forma ordenada, evitando a falência e garantindo a sobrevivência das operações.</p>

                <h3 class="subsection-title">1. O "Stay Period" (Período de Suspensão de Cobranças)</h3>
                <p>O deferimento do processamento da RJ suspende todas as ações e execuções contra a devedora pelo prazo legal de **180 dias**. A reforma trazida pela **Lei nº 14.112/2020** autoriza a prorrogação desse stay period por mais 180 dias uma única vez, contanto que o devedor não atue de forma procrastinatória no andamento processual.</p>

                <h3 class="subsection-title">2. Essencialidade de Bens de Capital Fiduciários (Art. 49, § 3º)</h3>
                <p>Credores garantidos por alienação fiduciária de bens móveis (como veículos, frotas, máquinas) **não se submetem** aos efeitos da recuperação judicial. Seus créditos são considerados extraconcursais.</p>
                
                <div class="alert alert-success">
                    <div class="alert-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <div class="alert-content">
                        <h4>A Exceção da Essencialidade no Stay Period</h4>
                        <p>Embora os credores fiduciários mantenham seu direito de propriedade, a lei proíbe expressamente a remoção ou venda de **bens de capital essenciais à atividade produtiva** da empresa devedora durante o *stay period*. A competência exclusiva para classificar e julgar a essencialidade dos bens (por exemplo, decidir que uma frota de caminhões não pode ser apreendida por ser vital para a logística da empresa) pertence unicamente ao **Juízo da Recuperação Judicial**.</p>
                    </div>
                </div>

                <h3 class="subsection-title">3. Classes de Credores da R.J.</h3>
                <div class="flow-timeline">
                    <div class="flow-step">
                        <div class="step-num">I</div>
                        <div class="step-info">
                            <h5>Trabalhistas</h5>
                            <p>Verbas decorrentes da legislação laboral e acidentária.</p>
                        </div>
                    </div>
                    <div class="flow-step">
                        <div class="step-num">II</div>
                        <div class="step-info">
                            <h5>Garantia Real</h5>
                            <p>Credores com garantia real de hipoteca ou penhor.</p>
                        </div>
                    </div>
                    <div class="flow-step">
                        <div class="step-num">III</div>
                        <div class="step-info">
                            <h5>Quirografários</h5>
                            <p>Títulos de crédito comuns, fornecedores ordinários e prestadores de serviços.</p>
                        </div>
                    </div>
                    <div class="flow-step">
                        <div class="step-num">IV</div>
                        <div class="step-info">
                            <h5>ME e EPP</h5>
                            <p>Créditos detidos por microempresas e empresas de pequeno porte.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Script for Tab Switching -->
    <script>
        function switchSection(sectionId) {
            // Deactivate all tabs
            const tabs = document.querySelectorAll('.doc-tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Deactivate all sections
            const sections = document.querySelectorAll('.tab-section');
            sections.forEach(sec => sec.classList.remove('active'));

            // Activate target
            const targetBtn = document.querySelector(`button[onclick="switchSection('${sectionId}')"]`);
            if (targetBtn) targetBtn.classList.add('active');

            const targetSection = document.getElementById(sectionId);
            if (targetSection) targetSection.classList.add('active');
        }
    </script>

            const allAccordions = document.querySelectorAll('.accordion');

            if (!isOpen) {

                collapse.style.maxHeight = collapse.scrollHeight + "px";

    const pillsContainer = document.getElementById('pillsContainer');
    const resultsCount = document.getElementById('resultsCount');
    const emptyState = document.getElementById('emptyState');
    const clearBtn = document.getElementById('clearBtn');

    let currentFilter = "all";

    function renderTools(filteredList) {
      toolsGrid.innerHTML = "";
      if (filteredList.length === 0) {
        emptyState.style.display = "block";
        resultsCount.innerHTML = "Mostrando <strong>0</strong> de " + tools.length + " ferramentas";
        return;
      }
      emptyState.style.display = "none";
      resultsCount.innerHTML = "Mostrando <strong>" + filteredList.length + "</strong> de " + tools.length + " ferramentas";

      filteredList.forEach(t => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => window.location.href = t.file;

        const tagElements = t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

        card.innerHTML = `
          <div class="card-icon">${t.icon}</div>
          <div class="card-title">${t.name}</div>
          <div class="card-desc">${t.desc}</div>
          <div class="card-tags">${tagElements}</div>
          <a href="${t.file}" class="card-link">

            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
        `;
        toolsGrid.appendChild(card);
      });
    }

    // ===== FILTER AND SEARCH LOGIC =====
    function filterTools() {
      const query = searchInput.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      
      const filtered = tools.filter(t => {
        // Category check
        const matchesCategory = currentFilter === "all" || t.category === currentFilter;
        
        // Search query check
        const matchesQuery = !query || 
                             t.name.toLowerCase().includes(query) || 
                             t.desc.toLowerCase().includes(query) || 
                             t.searchIndex.toLowerCase().includes(query) || 
                             t.tags.some(tag => tag.toLowerCase().includes(query));

        return matchesCategory && matchesQuery;
      });

      renderTools(filtered);
    }

    // ===== LISTENERS =====
    searchInput.addEventListener('input', filterTools);

    pillsContainer.addEventListener('click', (e) => {
      const pill = e.target.closest('.pill');
      if (!pill) return;

      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');

      currentFilter = pill.dataset.filter;
      filterTools();
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = "";
      currentFilter = "all";
      document.querySelectorAll('.pill').forEach(p => {
        p.classList.remove('active');
        if (p.dataset.filter === "all") p.classList.add('active');
      });
      filterTools();
    });

    // ===== INITIAL RENDER =====
    renderTools(tools);

                container.appendChild(rootHeading);

                rootFiles.forEach(file => {
                    const isActive = file.id === activeFileId;
                    const fileItem = document.createElement('div');
                    fileItem.className = `nested-file-item ${isActive ? 'active' : ''}`;
                    fileItem.style.marginLeft = '12px';
                    fileItem.onclick = () => openFile(file.id);

                    fileItem.innerHTML = `
                        <div class="nested-file-left">
                            <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="7" y1="17" x2="17" y2="7"></line>

        }

        // Collapse folder trigger
        function toggleFolderCollapse(folderId) {
            const contents = document.getElementById(`contents-${folderId}`);
            const row = contents.previousElementSibling;
            contents.classList.toggle('collapsed');
            row.classList.toggle('collapsed');
            
            const isCollapsed = contents.classList.contains('collapsed');
            localStorage.setItem(`folder_collapsed_${folderId}`, isCollapsed);
        }

        // Inline create folder form controls
        function showNewFolderForm(event) {
            if(event) event.stopPropagation();
            const form = document.getElementById('new-folder-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
            if(form.style.display === 'block') {
                const input = document.getElementById('new-folder-name-input');
                input.value = '';
                input.focus();
            }
        }

        function hideNewFolderForm() {
            document.getElementById('new-folder-form').style.display = 'none';
        }

        function handleNewFolderKey(event) {
            if (event.key === 'Enter') {
                createNewFolder();
            } else if (event.key === 'Escape') {
                hideNewFolderForm();
            }
        }

        function createNewFolder() {
            const input = document.getElementById('new-folder-name-input');
            const name = input.value.trim();
            if (name) {
                const folderId = 'folder-' + Date.now();
                folders.push({ id: folderId, name: name });
                localStorage.setItem('dashboard_folders', JSON.stringify(folders));
                hideNewFolderForm();
                renderSidebarTree();
            }
        }

        // Open file inside iframe viewport
        function openFile(fileId) {
            const items = document.querySelectorAll('.nested-file-item');
            items.forEach(item => item.classList.remove('active'));

            document.getElementById('welcome-screen').style.display = 'none';

            const frames = document.querySelectorAll('.editor-frame');
            frames.forEach(frame => frame.classList.remove('active'));

            const activeFrame = document.getElementById(`iframe-${fileId}`);
            activeFrame.classList.add('active');

            if (!activeFrame.srcdoc) {
                const rawHTML = document.getElementById(`data-${fileId}`).value;
                activeFrame.srcdoc = rawHTML;
            }

            activeFileId = fileId;
            document.getElementById('active-title').innerText = files.find(f => f.id === fileId).name;
            renderSidebarTree();
        }

        // Floating context menu logic
        const contextMenu = document.getElementById('context-menu');

        function hideContextMenu() {
            contextMenu.style.display = 'none';
        }

        document.addEventListener('click', hideContextMenu);

        function showFolderMenu(folderId, event) {
            event.stopPropagation();
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;

            contextMenu.style.left = `${event.clientX}px`;
            contextMenu.style.top = `${event.clientY}px`;
            contextMenu.style.display = 'block';

            contextMenu.innerHTML = `
                <div class="context-menu-header">Pasta: ${folder.name}</div>
                <div class="context-menu-item" onclick="renameFolder('${folderId}', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    Renomear Pasta
                </div>
                <div class="context-menu-item" onclick="deleteFolder('${folderId}', event)" style="color:#ef4444;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px; color:#ef4444;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Excluir Pasta
                </div>
            `;
        }

        function showFolderAddMenu(folderId, event) {
            event.stopPropagation();
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;

            contextMenu.style.left = `${event.clientX}px`;
            contextMenu.style.top = `${event.clientY}px`;
            contextMenu.style.display = 'block';

            let menuHTML = `<div class="context-menu-header">Organizar Arquivos</div>`;
            files.forEach(file => {
                const isChecked = file.folderId === folderId;
                menuHTML += `
                    <div class="context-menu-item" onclick="toggleFileInFolder('${file.id}', '${folderId}', event)">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} style="cursor:pointer; margin-right:6px;" onclick="event.stopPropagation(); toggleFileInFolder('${file.id}', '${folderId}', event)">
                        <span>${file.name}</span>
                    </div>
                `;
            });
            contextMenu.innerHTML = menuHTML;
        }

        function toggleFileInFolder(fileId, folderId, event) {
            if(event) event.stopPropagation();
            const file = files.find(f => f.id === fileId);
            if (file) {
                if (file.folderId === folderId) {
                    file.folderId = null; // Remove from folder
                } else {
                    file.folderId = folderId; // Move to folder
                }
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                renderSidebarTree();
            }
        }

        function renameFolder(folderId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;

            const newName = prompt("Digite o novo nome da pasta:", folder.name);
            if (newName && newName.trim()) {
                folder.name = newName.trim();
                localStorage.setItem('dashboard_folders', JSON.stringify(folders));
                renderSidebarTree();
            }
        }

        function deleteFolder(folderId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            if (confirm("Tem certeza que deseja excluir esta pasta? Os arquivos dentro dela serão movidos para fora (Raiz).")) {
                files.forEach(file => {
                    if (file.folderId === folderId) file.folderId = null;
                });
                folders = folders.filter(f => f.id !== folderId);
                localStorage.setItem('dashboard_folders', JSON.stringify(folders));
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                renderSidebarTree();
            }
        }

            });

                    <div class="context-menu-item" onclick="moveFileToFolder('${file.id}', null, event)" style="padding-left: 20px;">

            contextMenu.innerHTML = `
                <div class="context-menu-header">Arquivo: ${file.name}</div>
                <div class="context-menu-item" onclick="enableRename('${fileId}', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    Renomear
                </div>
                <div class="context-menu-item" onclick="deleteFile('${fileId}', event)" style="color:#ef4444;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px; color:#ef4444;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Excluir Relatório
                </div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-header">Mover para pasta:</div>
                ${moveSubmenuHTML ? moveSubmenuHTML : '<div class="context-menu-item" style="color:var(--text-muted); cursor:default;">Nenhuma pasta criada</div>'}
            `;
        }

        function moveFileToFolder(fileId, targetFolderId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            const file = files.find(f => f.id === fileId);
            if (file) {
                file.folderId = targetFolderId;
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                renderSidebarTree();
            }
        }

        function deleteFile(fileId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            const file = files.find(f => f.id === fileId);
            if (!file) return;

            if (confirm("Tem certeza que deseja excluir o relatório '" + file.name + "'?")) {
                files = files.filter(f => f.id !== fileId);
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                
                if (activeFileId === fileId) {
                    const activeFrame = document.getElementById(`iframe-${fileId}`);
                    if (activeFrame) activeFrame.classList.remove('active');
                    document.getElementById('welcome-screen').style.display = 'flex';
                    document.getElementById('active-title').innerText = 'Selecione um Relatório';
                    activeFileId = null;
                }
                
                renderSidebarTree();
            }
        }

        // Inline rename operations
        function enableRename(fileId, event) {
            if (event) event.stopPropagation();
            hideContextMenu();

            const textSpan = document.getElementById(`text-${fileId}`);
            const input = document.getElementById(`input-${fileId}`);
            
            if (textSpan) textSpan.style.display = 'none';
            
            if (input) {
                const file = files.find(f => f.id === fileId);
                input.style.display = 'inline-block';
                input.value = file.name;
                input.focus();
                input.select();
            }
        }

        function saveRename(fileId) {
            const textSpan = document.getElementById(`text-${fileId}`);
            const input = document.getElementById(`input-${fileId}`);

            if (input) {
                const newName = input.value.trim();
                if (newName) {
                    const file = files.find(f => f.id === fileId);
                    file.name = newName;
                    localStorage.setItem('dashboard_files', JSON.stringify(files));
                    if (textSpan) textSpan.innerText = newName;
                    
                    if (activeFileId === fileId) {
                        document.getElementById('active-title').innerText = newName;
                    }
                }
                input.style.display = 'none';
            }
            if (textSpan) textSpan.style.display = 'inline-block';
            renderSidebarTree();
        }

        function handleInputKey(fileId, event) {
            if (event.key === 'Enter') {
                saveRename(fileId);
            } else if (event.key === 'Escape') {
                const textSpan = document.getElementById(`text-${fileId}`);
                const input = document.getElementById(`input-${fileId}`);
                if (input) input.style.display = 'none';
                if (textSpan) textSpan.style.display = 'inline-block';
                renderSidebarTree();
            }
        }

        // Toggle full sidebar collapse
        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // Keyboard Shortcut listeners
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'b') {
                e.preventDefault();
                toggleSidebar();
            }
        });

        // Initial rendering on page load
        renderSidebarTree();
    </script>
</body>
</html>
