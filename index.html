    <style>
        :root {
            --bg-primary: #090d16;
            --bg-sidebar: #0f172a;
            --bg-editor: #090d16;
            --border-color: #1e293b;
            --text-muted: #64748b;
            --text-normal: #94a3b8;
            --text-active: #f8fafc;
            --accent-color: #6366f1; /* Indigo */
            --accent-glow: rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-editor);
            color: var(--text-normal);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Clean Layout */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            height: 100vh;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            user-select: none;
            flex-shrink: 0;
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-active);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 14px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        /* Interactive Folder Row */
        .folder-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-active);
            font-weight: 600;
            font-size: 13.5px;
            transition: background 0.2s ease;
        }

        .folder-row:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .folder-info {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .folder-info svg.arrow {
            width: 10px;
            height: 10px;
            color: var(--text-muted);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .folder-row.collapsed svg.arrow {
            transform: rotate(-90deg);
        }

        .folder-info svg.folder-icon {
            width: 16px;
            height: 16px;
            color: #818cf8; /* Light Indigo folder color */
            flex-shrink: 0;
        }

        .folder-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .folder-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .folder-row:hover .folder-actions {
            opacity: 1;
        }

        .folder-actions svg {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .folder-actions svg:hover {
            color: var(--text-active);
        }

        /* Nested Files under Folders (indented block) */
        .folder-contents {
            display: block;
        }

        .folder-contents.collapsed {
            display: none;
        }

        /* Nested File Item (matching the screenshot) */
        .nested-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 2px 0 2px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .nested-file-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .nested-file-item.active {
            background-color: #252526; /* Gray container box from screenshot */
            color: var(--text-active);
        }

        .nested-file-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .nested-file-left svg.arrow-icon {
            width: 12px;
            height: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .nested-file-item.active svg.arrow-icon {
            color: var(--accent-color);
        }

        .nested-file-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .nested-file-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nested-file-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Inline Rename Input */
        .rename-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--accent-color);
            color: #fff;
            font-size: 13px;
            padding: 2px 6px;
            border-radius: 4px;
            width: 100%;
            outline: none;
            display: none;
        }

        /* Action Buttons */
        .edit-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .nested-file-item:hover .edit-btn {
            opacity: 1;
        }

        .edit-btn:hover {
            color: var(--text-active);
            background: rgba(255, 255, 255, 0.05);
        }

        .edit-btn svg {
            width: 13px;
            height: 13px;
        }

        /* New Folder Inline Form */
        .new-folder-form {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 10px;
            margin: 6px 12px;
            display: none;
        }

        .new-folder-form input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 12.5px;
            outline: none;
        }

        .new-folder-form input:focus {
            border-color: var(--accent-color);
        }

        .new-folder-form-btns {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 8px;
        }

        .new-folder-form-btns button {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .new-folder-form-btns button.btn-ok {
            background-color: var(--accent-color);
            color: #fff;
        }

        .new-folder-form-btns button.btn-cancel {
            background: transparent;
            border-color: var(--border-color);
            color: var(--text-normal);
        }

        /* Floating Context Menu */
        .context-menu {
            display: none;
            position: absolute;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            z-index: 9999;
            padding: 6px 0;
            min-width: 180px;
        }

        .context-menu-item {
            padding: 8px 14px;
            font-size: 12.5px;
            color: var(--text-normal);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s ease;
        }

        .context-menu-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-active);
        }

        .context-menu-divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 4px 0;
        }

        .context-menu-header {
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-editor);
            height: 100vh;
            overflow: hidden;
        }

        /* Active File Header Bar */
        .editor-header {
            height: 55px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-shrink: 0;
        }

        .header-content-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .active-file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-active);
        }

        .active-file-info span.dot-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-color);
        }

        /* Toggle Sidebar Button */
        .toggle-sidebar-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .toggle-sidebar-btn:hover {
            color: var(--text-active);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .toggle-sidebar-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Viewport Container */
        .editor-viewport {
            flex: 1;
            position: relative;
            background-color: #0b0f19;
        }

        .editor-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .editor-frame.active {
            display: block;
        }

        /* Welcome Page */
        .welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-editor);
            color: var(--text-muted);
            text-align: center;
            padding: 24px;
        }

        .welcome-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .welcome-logo svg {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.05);
        }

        .welcome-screen h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .welcome-screen p {
            font-size: 13px;
        }
    </style>
</head>

            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #0ea5e9; /* Sky Blue */
            --accent-success: #10b981; /* Emerald */
            --accent-warning: #f59e0b; /* Amber */
            --accent-danger: #ef4444; /* Red */
            --border-color: #374151;
            --font-display: 'Outfit', sans-serif;

            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Light Mode Variable Overrides */

            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.topic-tab');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Remove active class from all panels
            const panels = document.querySelectorAll('.topic-panel');
            panels.forEach(panel => panel.classList.remove('active'));

            // Add active class to selected tab and panel
            const activePanel = document.getElementById(tabId);
            activePanel.classList.add('active');

            // Find the tab button that calls this function and make it active
            const clickedTab = Array.from(tabs).find(tab => tab.getAttribute('onclick').includes(tabId));
            if (clickedTab) {
                clickedTab.classList.add('active');
            }
        }

        // Theme Toggle logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // Check for saved theme preference, default to dark
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'light') {
                themeIcon.className = 'fa-solid fa-moon';
            } else {
                themeIcon.className = 'fa-solid fa-sun';
            }

    <script>
        let currentSlideIndex = 1;
        const totalSlides = 9;

        // Gerar bolinhas de navegaÃ§Ã£o
        const dotsContainer = document.getElementById('dots-container');
        for (let i = 1; i <= totalSlides; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i === 1 ? 'active' : ''}`;
            dot.onclick = () => goToSlide(i);
            dot.id = `dot-${i}`;
            dotsContainer.appendChild(dot);
        }

        // Ir para slide especÃ­fico
        function goToSlide(index) {
            if (index < 1 || index > totalSlides) return;
            
            // Remover classe ativa
            document.getElementById(`slide-${currentSlideIndex}`).classList.remove('active');
            document.getElementById(`dot-${currentSlideIndex}`).classList.remove('active');
            
            // Ativar novos
            currentSlideIndex = index;
            document.getElementById(`slide-${currentSlideIndex}`).classList.add('active');
            document.getElementById(`dot-${currentSlideIndex}`).classList.add('active');
            
            // Atualizar contador
            document.getElementById('slide-counter').innerText = `${currentSlideIndex} / ${totalSlides}`;
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides) {
                goToSlide(currentSlideIndex + 1);
            } else {
                goToSlide(1); // loop
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 1) {
                goToSlide(currentSlideIndex - 1);
            } else {
                goToSlide(totalSlides); // loop
            }
        }

        // Eventos de Teclado
        document.addEventListener('keydown', (e) => {
            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
            const isEditing = activeTag === 'input' || activeTag === 'textarea' || document.activeElement.isContentEditable;
            
            if (isEditing) return;

            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });
    </script>

      });

                    contentsDiv.appendChild(fileItem);

                container.appendChild(contentsDiv);
            });

            // 2. Render root files (outside folders)
            const rootFiles = files.filter(f => f.folderId === null);
            if (rootFiles.length > 0) {
                // Header for root files
                const rootHeading = document.createElement('div');
                rootHeading.className = 'sidebar-section-title';
                rootHeading.style.margin = '14px 0 6px 12px';
                rootHeading.innerText = 'Arquivos Sem Pasta';
                container.appendChild(rootHeading);

                rootFiles.forEach(file => {
                    const isActive = file.id === activeFileId;
                    const fileItem = document.createElement('div');
                    fileItem.className = `nested-file-item ${isActive ? 'active' : ''}`;
                    fileItem.style.marginLeft = '12px';
                    fileItem.onclick = () => openFile(file.id);

                    fileItem.innerHTML = `
                        <div class="nested-file-left">
                            <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                            <span class="nested-file-title" id="text-${file.id}">${file.name}</span>
                            <input type="text" class="rename-input" id="input-${file.id}" onblur="saveRename('${file.id}')" onkeydown="handleInputKey('${file.id}', event)" onclick="event.stopPropagation()">
                        </div>

                            <span class="nested-file-time">${file.time || 'now'}</span>

                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1.5"></circle><circle cx="12" cy="5" r="1.5"></circle><circle cx="12" cy="19" r="1.5"></circle></svg>
                            </button>
                        </div>
                    `;
                    container.appendChild(fileItem);
                });
            }
        }

        // Collapse folder trigger
        function toggleFolderCollapse(folderId) {
            const contents = document.getElementById(`contents-${folderId}`);
            const row = contents.previousElementSibling;
            contents.classList.toggle('collapsed');
            row.classList.toggle('collapsed');
            
            const isCollapsed = contents.classList.contains('collapsed');
            localStorage.setItem(`folder_collapsed_${folderId}`, isCollapsed);
        }

        // Inline create folder form controls
        function showNewFolderForm(event) {
            if(event) event.stopPropagation();
            const form = document.getElementById('new-folder-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
            if(form.style.display === 'block') {
                const input = document.getElementById('new-folder-name-input');
                input.value = '';
                input.focus();
            }
        }

        function hideNewFolderForm() {
            document.getElementById('new-folder-form').style.display = 'none';
        }

        function handleNewFolderKey(event) {
            if (event.key === 'Enter') {
                createNewFolder();
            } else if (event.key === 'Escape') {
                hideNewFolderForm();
            }
        }

        function createNewFolder() {
            const input = document.getElementById('new-folder-name-input');
            const name = input.value.trim();
            if (name) {
                const folderId = 'folder-' + Date.now();
                folders.push({ id: folderId, name: name });
                localStorage.setItem('dashboard_folders', JSON.stringify(folders));
                hideNewFolderForm();
                renderSidebarTree();
            }
        }

        // Open file inside iframe viewport
        function openFile(fileId) {
            const items = document.querySelectorAll('.nested-file-item');
            items.forEach(item => item.classList.remove('active'));

            document.getElementById('welcome-screen').style.display = 'none';

            const frames = document.querySelectorAll('.editor-frame');
            frames.forEach(frame => frame.classList.remove('active'));

            const activeFrame = document.getElementById(`iframe-${fileId}`);
            activeFrame.classList.add('active');

            if (!activeFrame.srcdoc) {
                const rawHTML = document.getElementById(`data-${fileId}`).value;
                activeFrame.srcdoc = rawHTML;
            }

            activeFileId = fileId;
            document.getElementById('active-title').innerText = files.find(f => f.id === fileId).name;
            renderSidebarTree();
        }

        // Floating context menu logic
        const contextMenu = document.getElementById('context-menu');

        function hideContextMenu() {
            contextMenu.style.display = 'none';
        }

        document.addEventListener('click', hideContextMenu);

        function showFolderMenu(folderId, event) {
            event.stopPropagation();
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;

            contextMenu.style.left = `${event.clientX}px`;
            contextMenu.style.top = `${event.clientY}px`;
            contextMenu.style.display = 'block';

            contextMenu.innerHTML = `
                <div class="context-menu-header">Pasta: ${folder.name}</div>
                <div class="context-menu-item" onclick="renameFolder('${folderId}', event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    Renomear Pasta
                </div>
                <div class="context-menu-item" onclick="deleteFolder('${folderId}', event)" style="color:#ef4444;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px; color:#ef4444;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Excluir Pasta
                </div>
            `;
        }

        function showFolderAddMenu(folderId, event) {
            event.stopPropagation();
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;

            contextMenu.style.left = `${event.clientX}px`;
            contextMenu.style.top = `${event.clientY}px`;
            contextMenu.style.display = 'block';

            let menuHTML = `<div class="context-menu-header">Organizar Arquivos</div>`;
            files.forEach(file => {
                const isChecked = file.folderId === folderId;
                menuHTML += `
                    <div class="context-menu-item" onclick="toggleFileInFolder('${file.id}', '${folderId}', event)">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} style="cursor:pointer; margin-right:6px;" onclick="event.stopPropagation(); toggleFileInFolder('${file.id}', '${folderId}', event)">
                        <span>${file.name}</span>
                    </div>
                `;
            });
            contextMenu.innerHTML = menuHTML;
        }

        function toggleFileInFolder(fileId, folderId, event) {
            if(event) event.stopPropagation();
            const file = files.find(f => f.id === fileId);
            if (file) {
                if (file.folderId === folderId) {
                    file.folderId = null; // Remove from folder
                } else {
                    file.folderId = folderId; // Move to folder
                }
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                renderSidebarTree();
            }
        }

        function renameFolder(folderId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;

            const newName = prompt("Digite o novo nome da pasta:", folder.name);
            if (newName && newName.trim()) {
                folder.name = newName.trim();
                localStorage.setItem('dashboard_folders', JSON.stringify(folders));
                renderSidebarTree();
            }
        }

        function deleteFolder(folderId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            if (confirm("Tem certeza que deseja excluir esta pasta? Os arquivos dentro dela serÃ£o movidos para fora (Raiz).")) {
                files.forEach(file => {
                    if (file.folderId === folderId) file.folderId = null;
                });
                folders = folders.filter(f => f.id !== folderId);
                localStorage.setItem('dashboard_folders', JSON.stringify(folders));
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                renderSidebarTree();
            }
        }

        function showFileMenu(fileId, event) {
            event.stopPropagation();
            const file = files.find(f => f.id === fileId);
            if (!file) return;

            contextMenu.style.left = `${event.clientX}px`;
            contextMenu.style.top = `${event.clientY}px`;
            contextMenu.style.display = 'block';

            let moveSubmenuHTML = '';
            folders.forEach(folder => {
                if (file.folderId !== folder.id) {
                    moveSubmenuHTML += `
                        <div class="context-menu-item" onclick="moveFileToFolder('${file.id}', '${folder.id}', event)" style="padding-left: 20px;">
                            ðŸ“ ${folder.name}
                        </div>
                    `;
                }
            });
            if (file.folderId !== null) {
                moveSubmenuHTML += `
                    <div class="context-menu-item" onclick="moveFileToFolder('${file.id}', null, event)" style="padding-left: 20px;">
                        ðŸ“„ [Mover para Raiz]
                    </div>
                `;
            }

            contextMenu.innerHTML = `
                <div class="context-menu-header">Arquivo: ${file.name}</div>
                <div class="context-menu-item" onclick="enableRename('${fileId}', event)">

                    Renomear

                <div class="context-menu-item" onclick="deleteFile('${fileId}', event)" style="color:#ef4444;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px; color:#ef4444;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Excluir RelatÃ³rio
                </div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-header">Mover para pasta:</div>
                ${moveSubmenuHTML ? moveSubmenuHTML : '<div class="context-menu-item" style="color:var(--text-muted); cursor:default;">Nenhuma pasta criada</div>'}
            `;
        }

        function moveFileToFolder(fileId, targetFolderId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            const file = files.find(f => f.id === fileId);
            if (file) {
                file.folderId = targetFolderId;
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                renderSidebarTree();
            }
        }

        function deleteFile(fileId, event) {
            if(event) event.stopPropagation();
            hideContextMenu();
            const file = files.find(f => f.id === fileId);
            if (!file) return;

            if (confirm("Tem certeza que deseja excluir o relatÃ³rio '" + file.name + "'?")) {
                files = files.filter(f => f.id !== fileId);
                localStorage.setItem('dashboard_files', JSON.stringify(files));
                
                if (activeFileId === fileId) {
                    const activeFrame = document.getElementById(`iframe-${fileId}`);
                    if (activeFrame) activeFrame.classList.remove('active');
                    document.getElementById('welcome-screen').style.display = 'flex';
                    document.getElementById('active-title').innerText = 'Selecione um RelatÃ³rio';
                    activeFileId = null;
                }
                
                renderSidebarTree();
            }
        }

        // Inline rename operations
        function enableRename(fileId, event) {
            if (event) event.stopPropagation();
            hideContextMenu();

            const textSpan = document.getElementById(`text-${fileId}`);
            const input = document.getElementById(`input-${fileId}`);
            
            if (textSpan) textSpan.style.display = 'none';
            
            if (input) {
                const file = files.find(f => f.id === fileId);
                input.style.display = 'inline-block';
                input.value = file.name;
                input.focus();
                input.select();
            }
        }

        function saveRename(fileId) {
            const textSpan = document.getElementById(`text-${fileId}`);
            const input = document.getElementById(`input-${fileId}`);

            if (input) {
                const newName = input.value.trim();
                if (newName) {
                    const file = files.find(f => f.id === fileId);
                    file.name = newName;
                    localStorage.setItem('dashboard_files', JSON.stringify(files));
                    if (textSpan) textSpan.innerText = newName;
                    
                    if (activeFileId === fileId) {
                        document.getElementById('active-title').innerText = newName;
                    }
                }
                input.style.display = 'none';
            }
            if (textSpan) textSpan.style.display = 'inline-block';
            renderSidebarTree();
        }

        function handleInputKey(fileId, event) {
            if (event.key === 'Enter') {
                saveRename(fileId);
            } else if (event.key === 'Escape') {
                const textSpan = document.getElementById(`text-${fileId}`);
                const input = document.getElementById(`input-${fileId}`);
                if (input) input.style.display = 'none';
                if (textSpan) textSpan.style.display = 'inline-block';
                renderSidebarTree();
            }
        }

        // Toggle full sidebar collapse
        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // Keyboard Shortcut listeners
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'b') {
                e.preventDefault();
                toggleSidebar();
            }
        });

        // Initial rendering on page load
        renderSidebarTree();
    </script>
